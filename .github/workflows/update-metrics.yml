name: update-metrics

# Re-renders assets/claude.svg from data/usage.json.
# - on push to data/**  -> instant refresh when your local cron pushes usage
# - on a schedule        -> keeps the SVG current even if the template changes
# - manual               -> run it yourself from the Actions tab
#
# Note: this does NOT pull ccusage (your Claude logs live on your laptop, not
# in CI). Your machine pushes data/usage.json via scripts/update-usage.sh;
# this job just turns that JSON into the themed panel and commits it.

on:
  push:
    paths:
      - "data/usage.json"
      - "scripts/render_metrics.py"
  schedule:
    - cron: "17 5 * * *"   # daily 05:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-metrics
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Render telemetry panel
        run: python3 scripts/render_metrics.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- assets/claude.svg; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/claude.svg
            git commit -m "chore: re-render Claude telemetry [skip ci]"
            git push
          else
            echo "no change"
          fi
