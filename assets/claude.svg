<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 230" width="900" height="230" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Courier New', monospace" role="img" aria-label="Claude co-pilot telemetry">
  <defs>
    <linearGradient id="cstroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="carea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/><stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cnum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5b4fc"/><stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <clipPath id="pc"><rect x="2" y="2" width="896" height="226" rx="16"/></clipPath>
    <style>
      .draw { stroke-dasharray: 1400; stroke-dashoffset: 1400; animation: dr 1.8s 0.2s ease-out forwards; }
      .blip { animation: bp 1.8s ease-in-out infinite; transform-origin: center; }
      @keyframes dr { to { stroke-dashoffset: 0; } }
      @keyframes bp { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
  </defs>

  <g clip-path="url(#pc)">
    <rect x="2" y="2" width="896" height="226" rx="16" fill="#0b0e14"/>

    <!-- header strip -->
    <text x="28" y="38" fill="#e6e9ef" font-size="13" letter-spacing="2">🤖 AI CO-PILOT TELEMETRY</text>
    <text x="270" y="38" fill="#8b94a7" font-size="12" letter-spacing="1.5">/ claude-code · ccusage</text>
    <rect x="700" y="22" width="172" height="22" rx="11" fill="#11151f" stroke="#1f2733"/>
    <circle cx="716" cy="33" r="4" fill="#34d399" class="blip"/>
    <text x="728" y="37" fill="#8b94a7" font-size="11">updated 2026-06-24</text>
    <line x1="28" y1="50" x2="872" y2="50" stroke="#161c27"/>

    <!-- hero metric -->
    <text x="28" y="78" fill="#8b94a7" font-size="12" letter-spacing="2">TOKENS · LAST 30 DAYS</text>
    <text x="26" y="138" fill="url(#cnum)" font-size="62" font-weight="700">84.2M</text>
    <rect x="28" y="156" width="210" height="24" rx="6" fill="#11151f" stroke="#1f2733"/>
    <text x="40" y="172" fill="#818cf8" font-size="12">primary ▸ opus-4-8</text>

    <!-- stat tiles -->
    <g font-size="12">
      <rect x="262" y="70" width="118" height="50" rx="8" fill="#11151f" stroke="#1f2733"/>
      <text x="276" y="90" fill="#8b94a7">COST</text>
      <text x="276" y="111" fill="#e6e9ef" font-size="18" font-weight="700">$312</text>
      <rect x="262" y="128" width="118" height="50" rx="8" fill="#11151f" stroke="#1f2733"/>
      <text x="276" y="148" fill="#8b94a7">SESSIONS</text>
      <text x="276" y="169" fill="#e6e9ef" font-size="18" font-weight="700">146</text>
      <rect x="388" y="70" width="86" height="108" rx="8" fill="#11151f" stroke="#1f2733"/>
      <text x="402" y="90" fill="#8b94a7">AVG/DAY</text>
      <text x="402" y="116" fill="#22d3ee" font-size="17" font-weight="700">6.0M</text>
      <text x="402" y="150" fill="#8b94a7" font-size="10">tokens</text>
      <text x="402" y="164" fill="#8b94a7" font-size="10">per active</text>
      <text x="402" y="176" fill="#8b94a7" font-size="10">day</text>
    </g>

    <!-- sparkline -->
    <text x="488" y="78" fill="#8b94a7" font-size="11" letter-spacing="1.5">DAILY BURN · last 14d</text>
    <line x1="488" y1="182" x2="860" y2="182" stroke="#161c27"/>
    <path d="M488.0,182.0 L488.0,150.4 L516.6,127.5 L545.2,140.9 L573.8,177.4 L602.5,182.0 L631.1,112.4 L659.7,105.5 L688.3,130.1 L716.9,119.0 L745.5,167.7 L774.2,172.5 L802.8,97.3 L831.4,86.0 L860.0,114.6 L860.0,182.0 Z" fill="url(#carea)"/>
    <polyline class="draw" points="488.0,150.4 516.6,127.5 545.2,140.9 573.8,177.4 602.5,182.0 631.1,112.4 659.7,105.5 688.3,130.1 716.9,119.0 745.5,167.7 774.2,172.5 802.8,97.3 831.4,86.0 860.0,114.6" fill="none" stroke="url(#cstroke)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="860.0" cy="114.6" r="4.5" fill="#22d3ee"/>
    <circle cx="860.0" cy="114.6" r="8" fill="none" stroke="#22d3ee" stroke-opacity="0.4" class="blip"/>
  </g>
  <rect x="2" y="2" width="896" height="226" rx="16" fill="none" stroke="#1f2733" stroke-width="1.5"/>
</svg>
